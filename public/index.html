<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#B42318" />
    
    <!-- Preconnect for Performance (like Airbnb) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />
    <link rel="dns-prefetch" href="https://api.allorigins.win" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Primary Meta Tags (Dynamic, updated by React Helmet) -->
    <title>Homavia - Verified Homestays, Bike Rentals & Car Rentals in India</title>
    <meta
      data-react-helmet="true"
      name="description"
      content="Find and book verified homestays, bike rentals, and car rentals across India with transparent pricing, direct host contact, and calendar-backed availability."
    />
    <meta data-react-helmet="true" name="keywords" content="Homavia, verified homestays India, book homestay, homestay booking India, bike rental India, car rental India, couple friendly stays" />
    <meta data-react-helmet="true" name="author" content="Homavia" />
    <meta data-react-helmet="true" name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link data-react-helmet="true" rel="canonical" href="https://homavia.in/" />

    <!-- Open Graph Meta Tags (Like Airbnb) -->
    <meta data-react-helmet="true" property="og:title" content="Homavia - Verified Homestays, Bike Rentals & Car Rentals in India" />
    <meta data-react-helmet="true" property="og:description" content="Discover verified homestays and local travel rentals with transparent pricing, calendar availability, and direct host contact." />
    <meta data-react-helmet="true" property="og:image" content="https://homavia.in/og-image.png" />
    <meta data-react-helmet="true" property="og:image:width" content="1200" />
    <meta data-react-helmet="true" property="og:image:height" content="630" />
    <meta data-react-helmet="true" property="og:image:alt" content="Homavia verified homestays and travel rentals" />
    <meta data-react-helmet="true" property="og:url" content="https://homavia.in/" />
    <meta data-react-helmet="true" property="og:type" content="website" />
    <meta data-react-helmet="true" property="og:site_name" content="Homavia" />
    <meta data-react-helmet="true" property="og:locale" content="en_IN" />

    <!-- Twitter Card Meta (Enhanced) -->
    <meta data-react-helmet="true" name="twitter:card" content="summary_large_image" />
    <meta data-react-helmet="true" name="twitter:title" content="Homavia - Verified Homestays & Travel Rentals" />
    <meta data-react-helmet="true" name="twitter:description" content="Find verified homestays, bike rentals, and car rentals across India with transparent pricing and direct host contact." />
    <meta data-react-helmet="true" name="twitter:image" content="https://homavia.in/og-image.png" />
    <meta data-react-helmet="true" name="twitter:image:alt" content="Homavia verified homestays and travel rentals" />
    
    <!-- Alternative Languages (for future expansion) -->
    <link data-react-helmet="true" rel="alternate" hreflang="en-in" href="https://homavia.in/" />
    <link data-react-helmet="true" rel="alternate" hreflang="x-default" href="https://homavia.in/" />

    <!-- Favicon & App Icons (Enhanced like Airbnb) -->
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" sizes="32x32" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" sizes="192x192" />
    <link rel="apple-touch-icon" href="/favicon.jpg" sizes="180x180" />
    <link rel="mask-icon" href="/favicon.jpg" color="#B42318" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts (Optimized) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Structured Data -->
    <script data-react-helmet="true" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "Homavia",
          "url": "https://homavia.in/",
          "description": "Verified homestays, bike rentals, and car rentals across India.",
          "inLanguage": "en-IN",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://homavia.in/?search={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "Homavia",
          "url": "https://homavia.in/",
          "logo": "https://homavia.in/og-image.png",
          "email": "takeoffheaven@gmail.com",
          "telephone": "+91-8638572663",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+91-8638572663",
            "email": "takeoffheaven@gmail.com",
            "contactType": "customer support",
            "areaServed": "IN",
            "availableLanguage": ["English", "Hindi"]
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <noscript>
      <div style="text-align: center; padding: 50px;">
        <h1>Homavia</h1>
        <p>You need to enable JavaScript to use Homavia's booking platform.</p>
        <p>Contact us at: takeoffheaven@gmail.com</p>
      </div>
    </noscript>
    
    <div id="root"></div>
  </body>
</html>
